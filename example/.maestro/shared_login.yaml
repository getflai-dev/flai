appId: com.example.flaiExample
---

# Shared login sub-flow — only runs when "Log in" button is visible.
# Handles the full email/password authentication flow.

- tapOn: "Log in"
- extendedWaitUntil:
    visible: "Continue"
    timeout: 10000
- tapOn: "Email"
- inputText: ${FLAI_TEST_EMAIL}
- tapOn: "Continue"
- extendedWaitUntil:
    visible: "Enter your password"
    timeout: 8000
- tapOn:
    point: "50%,42%"
- inputText: ${FLAI_TEST_PASSWORD}
- tapOn: "Continue"
