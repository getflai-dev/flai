appId: com.example.flaiExample
---

# FlAI Forgot Password E2E Test — Navigation Only
#
# Verifies the forgot password link on the password entry screen
# navigates to the reset password screen and back.
# Does NOT submit the form (avoids sending a real reset email).
#
# Run:
#   maestro test .maestro/forgot_password_test.yaml \
#     -e FLAI_TEST_EMAIL=you@example.com \
#     -e FLAI_TEST_PASSWORD=yourpassword

# ── Fresh start (clear app data + keychain to wipe persisted session) ─
- clearState: com.example.flaiExample
- clearKeychain
- launchApp:
    appId: com.example.flaiExample
    clearState: true
- waitForAnimationToEnd:
    timeout: 8000

# ── Navigate to password screen ──────────────────────────────────────
- extendedWaitUntil:
    visible: "Log in"
    timeout: 15000
- tapOn: "Log in"
- extendedWaitUntil:
    visible: "Continue"
    timeout: 5000
- tapOn: "Email"
- inputText: ${FLAI_TEST_EMAIL}
- tapOn: "Continue"

# ── Wait for password entry screen ───────────────────────────────────
- extendedWaitUntil:
    visible: "Enter your password"
    timeout: 8000

# ══════════════════════════════════════════════════════════════════════
# STEP 1: Tap "Forgot password?" link
# ══════════════════════════════════════════════════════════════════════
- tapOn: "Forgot password?"
- waitForAnimationToEnd:
    timeout: 3000

# ══════════════════════════════════════════════════════════════════════
# STEP 2: Assert Reset password screen appears
# ══════════════════════════════════════════════════════════════════════
- extendedWaitUntil:
    visible: "Reset password"
    timeout: 5000
- assertVisible: "Reset password"
- takeScreenshot: forgot_01_reset_screen

# ══════════════════════════════════════════════════════════════════════
# STEP 3: Tap back button (arrow at top-left) to return
# ══════════════════════════════════════════════════════════════════════
- tapOn:
    point: "8%,11%"
- waitForAnimationToEnd:
    timeout: 3000

# ══════════════════════════════════════════════════════════════════════
# STEP 4: Assert returns to password entry screen
# ══════════════════════════════════════════════════════════════════════
- extendedWaitUntil:
    visible: "Enter your password"
    timeout: 5000
- assertVisible: "Enter your password"
- takeScreenshot: forgot_02_back_to_password
