appId: com.example.flaiExample
---

- launchApp:
    appId: com.example.flaiExample
- waitForAnimationToEnd:
    timeout: 20000
- runFlow:
    when:
      visible: "Log in"
    file: shared_login.yaml
- extendedWaitUntil:
    visible: "CMMD"
    timeout: 15000

- tapOn:
    point: "8%,11%"
- waitForAnimationToEnd:
    timeout: 4000
- takeScreenshot: workspace_sidebar_collapsed

- tapOn:
    text: "[Test] CMMD"
- extendedWaitUntil:
    visible: "Switch workspace"
    timeout: 8000
- takeScreenshot: workspace_picker_open

- tapOn:
    point: "20%,56%"
- extendedWaitUntil:
    notVisible: "Switch workspace"
    timeout: 8000
- waitForAnimationToEnd:
    timeout: 8000
- tapOn:
    point: "8%,11%"
- waitForAnimationToEnd:
    timeout: 4000
- takeScreenshot: workspace_after_switch
