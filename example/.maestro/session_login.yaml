appId: com.example.flaiExample
---

# Sub-flow: Login via email/password for session test
#
# Used by session_test.yaml — only runs when "Log in" is visible.

- tapOn: "Log in"
- waitForAnimationToEnd:
    timeout: 5000
- tapOn: "Email"
- inputText: ${FLAI_TEST_EMAIL}
- tapOn: "Continue"
- extendedWaitUntil:
    visible: "Enter your password"
    timeout: 8000
- tapOn:
    point: "50%,42%"
- inputText: ${FLAI_TEST_PASSWORD}
- tapOn: "Continue"
