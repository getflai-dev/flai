    timeout: 90000
- runFlow:
    file: assert_real_response.yaml
- takeScreenshot: 03_knowledge

# ══════════════════════════════════════════════════════════════════════
# MESSAGE 4: Creative request
# ══════════════════════════════════════════════════════════════════════
- tapOn: "Ask Assistant anything..."
