appId: com.example.flaiExample
---

# Login helper sub-flow for logout_test.yaml
# Called conditionally when the user is not already logged in.

- extendedWaitUntil:
    visible: "Log in"
    timeout: 10000
- tapOn: "Log in"
- extendedWaitUntil:
    visible: "Email"
    timeout: 5000
- tapOn: "Email"
- inputText: ${FLAI_TEST_EMAIL}
- tapOn: "Continue"
- extendedWaitUntil:
    visible: "Enter your password"
    timeout: 8000
- tapOn:
    point: "50%,42%"
- inputText: ${FLAI_TEST_PASSWORD}
- tapOn: "Continue"
