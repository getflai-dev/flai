name: onboarding_flow
description: Configurable onboarding flow with splash, naming, multi-select pills, custom steps, and reveal animation.
version: 0.1.0
environment:
  mason: ">=0.1.0 <1.0.0"
vars:
  output_dir:
    type: string
    description: Output directory for generated files
    default: flai
    prompt: "Where should FlAI files be generated?"
