name: chat_experience
description: AI chat experience with composer v2, model selector, voice modes, ghost mode, and empty state.
version: 0.1.0
environment:
  mason: ">=0.1.0 <1.0.0"
vars:
  output_dir:
    type: string
    description: Output directory for generated files
    default: flai
    prompt: "Where should FlAI files be generated?"
