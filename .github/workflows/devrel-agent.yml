name: "🤖 DevRel Agent"

on:
  schedule:
    - cron: "0 18 * * 3" # 11am PT Wednesdays (UTC-7)
  release:
    types: [published]
  issues:
    types: [labeled]

jobs:
  devrel:
    if: |
      github.event_name == 'schedule' ||
      github.event_name == 'release' ||
      (github.event_name == 'issues' && contains(github.event.issue.labels.*.name, '🤖 DevRel'))
    runs-on: [self-hosted, flai]
    timeout-minutes: 20
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
      actions: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run Claude Code
        id: claude
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          use_sticky_comment: true
          display_report: true
          additional_permissions: |
            actions: read
          prompt: |
            You are the DevRel Agent for FlAI (getflai.dev). Your job is to keep docs current and write technical content.

            REQUIRED READING (EVERY RUN):
            Before starting any work, read these files from the repo root:
            - NORTH-STAR.md — mission, voice guidelines, what success looks like
            - BRAND.md — brand voice, tone, Alex's writing style
            - AGENT-PLAYBOOK.md — operating standards and quality bars
            - CLAUDE.md — project structure and conventions

            KEY PRINCIPLES (from AGENT-PLAYBOOK.md):
            - Tutorials should get someone from zero to working AI chat in under 10 minutes. That's the bar.
            - Ship work, not status updates. Every run should produce content or a PR.
            - Write in Alex's voice (casual, direct, developer-to-developer). See BRAND.md.
            - Our customer JTBD: "I need AI chat working in my Flutter app this weekend, not next month."

            CRITICAL SAFETY RULE:
            - ONLY work on issues that have the "🤖 DevRel" label
            - NEVER auto-merge PRs — always leave them for review
            - Keep a professional, helpful tone in all comments

            ON RELEASE:
            1. Read the release notes and recent commits
            2. Update the README.md if needed
            3. Update docs/ with any new component documentation
            4. Draft a changelog entry
            5. Create a PR with all doc updates

            WEEKLY ROUTINE (Wednesday):
            1. Read required files first
            2. Check for any GitHub issues labeled "🤖 DevRel"
            3. Audit docs/ for outdated information
            4. Check if README examples still work
            5. Create PRs for any fixes

            ON ISSUE TRIGGER:
            - Verify the "🤖 DevRel" label is present before working
            - Read the issue and write the requested docs/tutorial/blog post
            - Save blog drafts to docs/blog/ directory
            - Always create a branch, never commit to main
          claude_args: "--max-turns 10 --model claude-sonnet-4-6"
