name: flai_cli
description: >-
  CLI tool for installing FlAI AI chat components into Flutter projects.
  A shadcn/ui-style distribution model — own your component source code.
version: 0.2.0
repository: https://github.com/getflai-dev/flai
homepage: https://getflai.dev
topics:
  - flutter
  - ai
  - chat
  - ui-components
  - cli

environment:
  sdk: ^3.7.0

executables:
  flai: flai

dependencies:
  args: ^2.7.0
  mason: ^0.1.0
  path: ^1.9.0
  xml: ^6.5.0
  yaml: ^3.1.0
  yaml_edit: ^2.2.0

dev_dependencies:
  test: ^1.25.0
