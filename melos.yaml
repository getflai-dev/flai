name: flutter_ai_chat_components

packages:
  - packages/*
  - example

command:
  bootstrap:
    usePubspecOverrides: true

scripts:
  analyze:
    exec: dart analyze --fatal-infos
    description: Run dart analyze in all packages

  format:
    exec: dart format --set-exit-if-changed .
    description: Check formatting in all packages

  test:
    exec: dart test
    description: Run tests in all packages
    packageFilters:
      dirExists: test
      ignore:
        - flai_example

  build:
    exec: flutter build apk --debug
    description: Build example app
    packageFilters:
      fileExists: lib/main.dart
